<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Web App</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- jQuery linking -->

    <link rel="stylesheet" href="style.css">
    <!-- css linking -->

    <script src="app.js"></script>
    <!-- javascript linking -->

</head>
<body>
    
    <main>
        <section class="counter_header">
            <h1>Counting Web App</h1>
        </section>

        <section class="counter_body">
            <div class="label_wrapper">
                <label for="#" id="count_label" class="count_label"> 
                    0 
                </label>
            </div>



            <div class="buttons_wrapper">
                <button class="subtraction">-</button>
                <button class="clear">Clear</button>
                <button class="addition">+</button>
            </div>
            
        </section>

        <section class="goal_wrapper">

            <form action="#">
                <label for="goal">Goal:</label>
                <input type="text" class="goal">
                <input type="submit" class="submit">
                <h2>></h2>
            </form>
            
        </section>
    </main>
    


</body>
</html>
